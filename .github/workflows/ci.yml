name: CI

on:
  push:
    branches: [ main, develop, "feat/**", "fix/**" ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore AMR.Forms.Fabrica.sln

      - name: Build
        run: dotnet build AMR.Forms.Fabrica.sln --no-restore --configuration Release

      - name: Run unit tests + coverage
        run: |
          dotnet test AMR.Forms.Fabrica.sln \
            --no-build \
            --configuration Release \
            --verbosity normal \
            --collect:"XPlat Code Coverage" \
            --results-directory ./TestResults

      - name: Install ReportGenerator
        run: dotnet tool install --global dotnet-reportgenerator-globaltool

      - name: Generate coverage summary
        if: always()
        run: |
          reportgenerator \
            -reports:"./TestResults/**/coverage.cobertura.xml" \
            -targetdir:"./TestResults/CoverageReport" \
            -reporttypes:"MarkdownSummaryGithub;Cobertura" \
            -verbosity:Warning
          cat ./TestResults/CoverageReport/SummaryGithub.md >> $GITHUB_STEP_SUMMARY

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage
          path: |
            **/TestResults/**/coverage.cobertura.xml
            TestResults/CoverageReport/
          retention-days: 14

  frontend-test:
    name: Frontend Tests (Vitest)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: amr-forms-fabrica-web/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: amr-forms-fabrica-web

      - name: Run Vitest
        run: npm run test:run
        working-directory: amr-forms-fabrica-web

      - name: Run coverage
        run: npm run coverage -- --reporter=json-summary --outputFile=./coverage/coverage-summary.json 2>/dev/null || npm run coverage
        working-directory: amr-forms-fabrica-web
        continue-on-error: true
